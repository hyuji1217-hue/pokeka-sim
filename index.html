<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポケカシミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 24px; }
  h1 { color: #f5a623; margin-bottom: 24px; font-size: 1.6rem; }

  .container { max-width: 900px; margin: 0 auto; }

  .deck-area { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .deck-box { background: #16213e; border-radius: 12px; padding: 16px; }
  .deck-box h2 { color: #a8c8f0; font-size: 1rem; margin-bottom: 8px; }
  .deck-box textarea {
    width: 100%; height: 280px; background: #0f3460; color: #eee;
    border: 1px solid #334; border-radius: 8px; padding: 8px;
    font-family: monospace; font-size: 0.85rem; resize: vertical;
  }
  .deck-hint { font-size: 0.75rem; color: #888; margin-top: 6px; }

  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .controls label { color: #aaa; font-size: 0.9rem; }
  .controls input[type=number] {
    width: 80px; padding: 6px 8px; background: #0f3460;
    border: 1px solid #334; border-radius: 6px; color: #eee; font-size: 0.9rem;
  }
  button {
    padding: 10px 28px; background: #f5a623; color: #1a1a2e;
    border: none; border-radius: 8px; font-weight: bold; font-size: 1rem;
    cursor: pointer; transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  #progress { font-size: 0.9rem; color: #aaa; min-width: 120px; }

  .result-box {
    background: #16213e; border-radius: 12px; padding: 20px;
    display: none; border: 2px solid #f5a623;
  }
  .result-box h2 { color: #f5a623; margin-bottom: 16px; }

  .bars { display: flex; height: 32px; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .bar-a { background: #4a90e2; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
  .bar-b { background: #e24a4a; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
  .bar-d { background: #666; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat { background: #0f3460; border-radius: 8px; padding: 12px; text-align: center; }
  .stat .val { font-size: 1.8rem; font-weight: bold; color: #f5a623; }
  .stat .lbl { font-size: 0.75rem; color: #aaa; margin-top: 2px; }

  .error { color: #ff6b6b; background: #2d0000; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }

  .sample-btn {
    background: #334; color: #aaa; padding: 6px 14px;
    font-size: 0.8rem; font-weight: normal; border-radius: 6px;
  }
  .deck-code-row {
    display: flex; gap: 6px; margin-bottom: 8px;
  }
  .deck-code-row input {
    flex: 1; padding: 6px 10px; background: #0f3460; border: 1px solid #334;
    border-radius: 6px; color: #eee; font-size: 0.82rem; font-family: monospace;
  }
  .code-btn {
    padding: 6px 14px; font-size: 0.82rem; font-weight: bold;
    background: #2a4a7f; color: #eee; border: none; border-radius: 6px; cursor: pointer;
  }
  .code-btn:hover { background: #3a5a9f; }
</style>
</head>
<body>
<div class="container">
  <h1>🃏 ポケカシミュレーター</h1>

  <div class="deck-area">
    <div class="deck-box">
      <h2>デッキ A</h2>
      <div class="deck-code-row">
        <input type="text" id="code-a" placeholder="デッキコード（例: KG88YD-a6t2aC-Gc884c）" maxlength="20">
        <button class="code-btn" onclick="loadFromCode('a')">読み込み</button>
      </div>
      <textarea id="deck-a" placeholder="デッキコードで読み込むか、カードIDを直接入力&#10;例: 4 sv8pt5-73"></textarea>
      <div class="deck-hint" id="hint-a">デッキコードを貼って「読み込み」を押すか、直接入力</div>
    </div>
    <div class="deck-box">
      <h2>デッキ B</h2>
      <div class="deck-code-row">
        <input type="text" id="code-b" placeholder="デッキコード（例: KG88YD-a6t2aC-Gc884c）" maxlength="20">
        <button class="code-btn" onclick="loadFromCode('b')">読み込み</button>
      </div>
      <textarea id="deck-b" placeholder="デッキコードで読み込むか、カードIDを直接入力&#10;例: 4 sv8pt5-73"></textarea>
      <div class="deck-hint" id="hint-b">デッキコードを貼って「読み込み」を押すか、直接入力</div>
    </div>
  </div>

  <div class="controls">
    <label>試行回数：<input type="number" id="iterations" value="1000" min="100" max="10000" step="100"></label>
    <button id="run-btn" onclick="runSim()">シミュレーション開始</button>
    <button class="sample-btn" onclick="loadSample()">サンプルデッキを読み込む</button>
    <span id="progress"></span>
  </div>

  <div class="error" id="error-box"></div>

  <div class="result-box" id="result-box">
    <h2>結果</h2>
    <div class="bars" id="bars"></div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<script type="module">
// cards.jsonを読み込んでシミュレーターを初期化
let cardDb = null;
let sim = null;

async function loadCardDb() {
  if (cardDb) return cardDb;
  const res = await fetch('./data/cards.json');
  if (!res.ok) throw new Error('data/cards.json が見つかりません。fetch-cards.js を先に実行してください。');
  cardDb = await res.json();
  return cardDb;
}

function parseDecklist(text, db) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const deck = [];
  const errors = [];

  for (const line of lines) {
    // "4 Pikachu" 形式または "sv9-001" 形式を許容
    const match = line.match(/^(\d+)\s+(.+)$/) || [null, '1', line];
    const count = parseInt(match[1]) || 1;
    const query = match[2].trim();

    // IDで直接検索
    if (db[query]) {
      for (let i = 0; i < count; i++) deck.push(db[query]);
      continue;
    }
    // 名前（部分一致）で検索
    const found = Object.values(db).find(c => c.name.toLowerCase() === query.toLowerCase());
    if (found) {
      for (let i = 0; i < count; i++) deck.push(found);
    } else {
      errors.push(query);
    }
  }

  return { deck, errors };
}

window.runSim = async function() {
  const btn = document.getElementById('run-btn');
  const prog = document.getElementById('progress');
  const errBox = document.getElementById('error-box');
  const resultBox = document.getElementById('result-box');

  btn.disabled = true;
  errBox.style.display = 'none';
  resultBox.style.display = 'none';
  prog.textContent = 'カードDB読み込み中…';

  try {
    const db = await loadCardDb();
    prog.textContent = 'デッキ解析中…';

    const textA = document.getElementById('deck-a').value;
    const textB = document.getElementById('deck-b').value;
    const { deck: deckA, errors: errA } = parseDecklist(textA, db);
    const { deck: deckB, errors: errB } = parseDecklist(textB, db);

    const allErrors = [...errA.map(e => `[A] ${e}`), ...errB.map(e => `[B] ${e}`)];
    if (allErrors.length > 0) {
      showError('見つからないカード:\n' + allErrors.join('\n'));
      btn.disabled = false; prog.textContent = '';
      return;
    }
    if (deckA.length < 20 || deckB.length < 20) {
      showError(`デッキが小さすぎます（A:${deckA.length}枚 / B:${deckB.length}枚）。`);
      btn.disabled = false; prog.textContent = '';
      return;
    }

    const iters = parseInt(document.getElementById('iterations').value) || 1000;
    prog.textContent = `0 / ${iters} 完了…`;

    // バンドル済みシミュレーターをインポート（src/はTypeScriptのまま、dist/がビルド成果物）
    const { runSimulation, initSimulator } = await import('./dist/simulator.js');
    initSimulator(db);

    const result = await runSimulation(deckA, deckB, iters, (done, total) => {
      prog.textContent = `${done} / ${total} 完了…`;
    });

    prog.textContent = `${iters} / ${iters} 完了`;
    showResult(result);
  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
  }
};

function showResult(r) {
  const box = document.getElementById('result-box');
  box.style.display = 'block';

  // バー
  document.getElementById('bars').innerHTML = `
    <div class="bar-a" style="width:${r.winRateA}%">${r.winRateA}%</div>
    <div class="bar-d" style="width:${r.drawRate}%">${r.drawRate > 2 ? r.drawRate+'%' : ''}</div>
    <div class="bar-b" style="width:${r.winRateB}%">${r.winRateB}%</div>
  `;

  // 数値
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="val" style="color:#4a90e2">${r.winRateA}%</div><div class="lbl">デッキA 勝率</div></div>
    <div class="stat"><div class="val" style="color:#e24a4a">${r.winRateB}%</div><div class="lbl">デッキB 勝率</div></div>
    <div class="stat"><div class="val">${r.avgTurns}</div><div class="lbl">平均ターン数</div></div>
    <div class="stat"><div class="val">${r.iterations}</div><div class="lbl">試行回数</div></div>
    <div class="stat"><div class="val">${r.winsA}</div><div class="lbl">A 勝ち数</div></div>
    <div class="stat"><div class="val">${r.winsB}</div><div class="lbl">B 勝ち数</div></div>
    ${r.draws > 0 ? `<div class="stat"><div class="val">${r.draws}</div><div class="lbl">引き分け</div></div>` : ''}
  `;
}

function showError(msg) {
  const b = document.getElementById('error-box');
  b.textContent = msg; b.style.display = 'block';
}

// 日本語カード名 → 英語カード名マッピング
const JA_TO_EN = {

  'ドラメシヤ':'Dreepy','ドロンチ':'Drakloak','ドラパルトex':'Dragapult ex',
  'アチャモ':'Torchic','ワカシャモ':'Combusken','バシャーモex':'Blaziken ex',
  'マシマシラ':'Munkidori','ファイヤー':'Moltres','キチキギスex':'Fezandipiti ex',
  'スボミー':'Budew','ニャースex':'Meowth ex','パオジアン':'Chien-Pao',
  'ピカチュウex':'Pikachu ex','ライチュウ':'Raichu','ライチュウV':'Raichu V',
  'リザードンex':'Charizard ex','ヒトカゲ':'Charmander','リザード':'Charmeleon',
  'フシギダネ':'Bulbasaur','フシギソウ':'Ivysaur','フシギバナex':'Venusaur ex',
  'ゼニガメ':'Squirtle','カメール':'Wartortle','カメックスex':'Blastoise ex',
  'テツノカイナex':'Iron Hands ex','テツノブジンex':'Iron Valiant ex',
  'パルデアケンタロスex':'Paldean Tauros ex','パフュートン':'Aromatisse',
  'オーガポンex':'Ogerpon ex','チオンジェン':'Wo-Chien','パオジアン':'Chien-Pao',
  'イイネイヌex':'Okidogi ex','マシマシラex':'Munkidori ex',
  'ブリジュラスex':'Archaludon ex','カイナex':'Iron Hands ex',
  'ガチグマ（アカツキ）ex':'Bloodmoon Ursaluna ex',
  'ルギアV':'Lugia V','ルギアVSTAR':'Lugia VSTAR',
  'ミライドンex':'Miraidon ex','コライドンex':'Koraidon ex',
  'ディアルガVSTAR':'Dialga VSTAR','パルキアVSTAR':'Palkia VSTAR',
  'アルセウスVSTAR':'Arceus VSTAR','ゲンガーVMAX':'Gengar VMAX',
  'ムゲンダイナVMAX':'Eternatus VMAX','こくばバドレックスVMAX':'Shadow Rider Calyrex VMAX',
  'こくばバドレックスV':'Shadow Rider Calyrex V',
  'はくばバドレックスVMAX':'Ice Rider Calyrex VMAX',
  'ガラル サンダーV':'Galarian Zapdos V','ガラルサンダーV':'Galarian Zapdos V',
  // グッズ
  'ハイパーボール':'Ultra Ball','スーパーボール':'Great Ball','モンスターボール':'Poke Ball',
  'なかよしポフィン':'Pal Pad','ネストボール':'Nest Ball','クイックボール':'Quick Ball',
  'レベルボール':'Level Ball','バトルVIPパス':'Battle VIP Pass',
  'ポケモンいれかえ':'Switch','あなぬけのヒモ':'Escape Rope',
  'ふしぎなアメ':'Rare Candy','エネルギーつけかえ':'Energy Switch',
  'ポケモン通信':'Pokemon Communication','トレーナーズポスト':'Trainers Mail',
  'かるいし':'Air Balloon','ロストスイーパー':'Lost Sweeper',
  'ロストバキューム':'Lost Vacuum','クラッシュハンマー':'Crushing Hammer',
  'アンフェアスタンプ':'Unfair Stamp','カウンターキャッチャー':'Counter Catcher',
  'ジャッジマン':'Judge','ボスの指令':'Boss Order','ボスの指令（ロケット団）':'Boss Order',
  'ポケモンブリーダーの育成':'Pokemon Breeder\'s Nurturing',
  // サポート
  '博士の研究':'Professor\'s Research','マリィ':'Marnie','ボスの指令（ジニア）':'Arven',
  'ジニア':'Arven','ナンジャモ':'Iono','ペパー':'Penny','カエデ':'Carmine',
  'オーリム博士の気迫':'Professor Sada\'s Vitality',
  'フトゥー博士のシナリオ':'Professor Turo\'s Scenario',
  'チェレンの気配り':'Cheren\'s Care',
  // スタジアム
  'ロストシティ':'Lost City','ミストエネルギー':'Mist Energy',
  '頂への雪道':'Path to the Peak','ターボパッチ':'Turbo Patch',
  // エネルギー
  '基本炎エネルギー':'Fire Energy','基本水エネルギー':'Water Energy',
  '基本草エネルギー':'Grass Energy','基本雷エネルギー':'Lightning Energy',
  '基本超エネルギー':'Psychic Energy','基本闘エネルギー':'Fighting Energy',
  '基本悪エネルギー':'Darkness Energy','基本鋼エネルギー':'Metal Energy',
  '基本フェアリーエネルギー':'Fairy Energy','基本ドラゴンエネルギー':'Dragon Energy',
  '基本無色エネルギー':'Colorless Energy',
  'オーロラエネルギー':'Aurora Energy','ダブルターボエネルギー':'Double Turbo Energy',
  'ジェットエネルギー':'Jet Energy','ミラージュゲート':'Mirage Gate',
  'ツインエネルギー':'Twin Energy','ヒート炎エネルギー':'Heat Fire Energy',
};

const PROXY = 'https://acta-line-webhook.hyuji1217.workers.dev/deck-code?id=';

window.loadFromCode = async function(side) {
  const codeEl = document.getElementById('code-' + side);
  const hintEl = document.getElementById('hint-' + side);
  const code = codeEl.value.trim();
  if (!code) { hintEl.textContent = 'デッキコードを入力してください'; return; }

  hintEl.textContent = '読み込み中...';
  try {
    const db = await loadCardDb();
    const res = await fetch(PROXY + encodeURIComponent(code));
    if (!res.ok) throw new Error('取得失敗 ' + res.status);
    const { cards, error } = await res.json();
    if (error) throw new Error(error);

    const lines = [];
    const unmatched = [];
    for (const c of cards) {
      const enName = JA_TO_EN[c.name] ?? c.name;
      // DBから英語名で検索（部分一致）
      const found = Object.values(db).find(d =>
        d.name.toLowerCase() === enName.toLowerCase()
      );
      if (found) {
        lines.push(c.count + ' ' + found.id);
      } else {
        lines.push(c.count + ' ' + enName);
        unmatched.push(c.name);
      }
    }
    document.getElementById('deck-' + side).value = lines.join('\n');
    if (unmatched.length) {
      hintEl.textContent = '読込完了（未マッチ: ' + unmatched.join(', ') + '）';
    } else {
      hintEl.textContent = '✅ 読込完了（' + cards.length + '種）';
    }
  } catch(e) {
    hintEl.textContent = '❌ ' + e.message;
  }
};

window.loadSample = function() {
  // デッキが確定したらここにカードIDを入れてください
  // 形式: "4 カードID" を1行ずつ（合計60枚）
  // 例: "4 sv8pt5-28" → Pikachu ex を4枚
  document.getElementById('deck-a').value = '';
  document.getElementById('deck-b').value = '';
  alert('デッキAとBのテキストエリアにカードIDを入力してください。\n形式: "4 sv8pt5-28" など（枚数 + スペース + ID）');
};
</script>
</body>
</html>
